<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Pika — Cute Photo Booth App</title>
    <meta name="description" content="Pika is a cute, modern photo booth app. Capture a sequence of selfies, pick a frame theme, apply effects, and download your collage — all in your browser. No install required." />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#e8447a" />

    <!-- Mobile web app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pika" />

    <!-- Canonical -->
    <link rel="canonical" href="https://pika.rahulsharma.me/" />

    <!-- Favicon / Icons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:image" content="https://pika.rahulsharma.me/preview.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pika photo booth app screenshot" />
